<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Local Dispensary Price Comparison</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(145deg, #0b0c0e 0%, #1a1e24 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      color: #e0e0e0;
      padding: 0.5rem;
    }

    .page-container {
      width: 100%;
      max-width: 1100px;
      margin: 0.5rem auto;
    }

    .header {
      background: rgba(20, 22, 27, 0.95);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 1.5rem;
      padding: 1.4rem 1.5rem 1.2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      margin-bottom: 1rem;
    }

    .header h1 {
      font-weight: 600;
      font-size: clamp(1.4rem, 4vw, 1.9rem);
      letter-spacing: 0.5px;
      color: #f0d78c;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
      margin-bottom: 0.3rem;
    }

    .header p {
      color: #8a9ab0;
      font-size: 0.9rem;
    }

    .controls {
      background: rgba(20, 22, 27, 0.95);
      backdrop-filter: blur(18px);
      border-radius: 1.2rem;
      padding: 1rem 1.2rem;
      border: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 1rem;
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .controls label {
      color: #8a9ab0;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .controls select,
    .controls input[type="text"] {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 0.6rem;
      color: #e0e0e0;
      padding: 0.45rem 0.8rem;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .controls select:focus,
    .controls input[type="text"]:focus {
      border-color: #f0d78c;
    }

    .controls select option {
      background: #1a1e24;
    }

    .search-group {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex: 1;
      min-width: 180px;
    }

    .search-group input {
      flex: 1;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .sort-group {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-left: auto;
    }

    /* Dispensary columns layout */
    .comparison-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }

    .dispensary-card {
      background: rgba(20, 22, 27, 0.95);
      backdrop-filter: blur(18px);
      border-radius: 1.2rem;
      border: 1px solid rgba(255,255,255,0.12);
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .dispensary-header {
      padding: 1rem 1.2rem 0.8rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.5rem;
    }

    .dispensary-name {
      font-weight: 700;
      font-size: 1.05rem;
      color: #f0d78c;
    }

    .dispensary-meta {
      font-size: 0.78rem;
      color: #6a7a8a;
      margin-top: 0.2rem;
    }

    .dispensary-badge {
      background: rgba(240,215,140,0.12);
      border: 1px solid rgba(240,215,140,0.3);
      color: #f0d78c;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      white-space: nowrap;
    }

    .dispensary-badge.medical {
      background: rgba(100,200,140,0.12);
      border-color: rgba(100,200,140,0.3);
      color: #64c88c;
    }

    .product-list {
      padding: 0.6rem 0;
    }

    .product-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.55rem 1.2rem;
      transition: background 0.15s;
    }

    .product-row:hover {
      background: rgba(255,255,255,0.04);
    }

    .product-row.hidden {
      display: none;
    }

    .product-info {
      flex: 1;
      min-width: 0;
    }

    .product-name {
      font-size: 0.88rem;
      font-weight: 500;
      color: #d0d8e4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .product-type-tag {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      margin-top: 0.15rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .tag-flower   { background: rgba(100,200,100,0.15); color: #78c87a; }
    .tag-edible   { background: rgba(200,150,100,0.15); color: #c89664; }
    .tag-concentrate { background: rgba(100,150,240,0.15); color: #7a9ef0; }
    .tag-vape     { background: rgba(180,100,220,0.15); color: #c064dc; }
    .tag-tincture { background: rgba(240,200,80,0.15);  color: #e0c050; }
    .tag-topical  { background: rgba(80,200,220,0.15);  color: #50c8dc; }

    .product-price-col {
      text-align: right;
      flex-shrink: 0;
      margin-left: 0.8rem;
    }

    .product-price {
      font-size: 1rem;
      font-weight: 700;
      color: #f0d78c;
    }

    .product-price.best {
      color: #64c88c;
    }

    .product-unit {
      font-size: 0.72rem;
      color: #5a6a7a;
      margin-top: 0.1rem;
    }

    .no-results {
      text-align: center;
      color: #5a6a7a;
      padding: 2.5rem 1rem;
      font-size: 0.9rem;
    }

    /* Summary bar */
    .summary-bar {
      background: rgba(20, 22, 27, 0.95);
      border-radius: 1.2rem;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 0.9rem 1.2rem;
      margin-bottom: 1rem;
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .summary-stat {
      display: flex;
      flex-direction: column;
    }

    .summary-stat .stat-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: #f0d78c;
    }

    .summary-stat .stat-label {
      font-size: 0.72rem;
      color: #6a7a8a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .best-deal-banner {
      margin-left: auto;
      background: rgba(100,200,140,0.12);
      border: 1px solid rgba(100,200,140,0.25);
      border-radius: 0.7rem;
      padding: 0.5rem 1rem;
      font-size: 0.82rem;
      color: #64c88c;
    }

    .best-deal-banner strong {
      color: #8de8ae;
    }

    /* Legend */
    .legend {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.75rem;
      color: #7a8a9a;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .dot-best { background: #64c88c; }
    .dot-normal { background: #f0d78c; }

    footer {
      text-align: center;
      color: #3a4a5a;
      font-size: 0.75rem;
      padding: 1.5rem 0 0.5rem;
    }

    @media (max-width: 640px) {
      .comparison-grid {
        grid-template-columns: 1fr;
      }
      .sort-group {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
<div class="page-container">

  <div class="header">
    <h1>Local Dispensary Price Comparison</h1>
    <p>Compare medical marijuana prices across nearby dispensaries &mdash; updated regularly</p>
    <div class="legend" style="margin-top:0.7rem;">
      <div class="legend-item"><div class="legend-dot dot-best"></div> Best price for item</div>
      <div class="legend-item"><div class="legend-dot dot-normal"></div> Standard price</div>
    </div>
  </div>

  <div class="summary-bar" id="summaryBar">
    <div class="summary-stat">
      <span class="stat-value" id="statDispensaries">0</span>
      <span class="stat-label">Dispensaries</span>
    </div>
    <div class="summary-stat">
      <span class="stat-value" id="statProducts">0</span>
      <span class="stat-label">Products listed</span>
    </div>
    <div class="summary-stat">
      <span class="stat-value" id="statCategories">0</span>
      <span class="stat-label">Categories</span>
    </div>
    <div class="best-deal-banner" id="bestDealBanner"></div>
  </div>

  <div class="controls">
    <div class="search-group">
      <label for="searchInput">Search</label>
      <input type="text" id="searchInput" placeholder="Product name..." oninput="applyFilters()">
    </div>
    <div class="filter-group">
      <label for="typeFilter">Type</label>
      <select id="typeFilter" onchange="applyFilters()">
        <option value="">All types</option>
        <option value="flower">Flower</option>
        <option value="edible">Edible</option>
        <option value="concentrate">Concentrate</option>
        <option value="vape">Vape</option>
        <option value="tincture">Tincture</option>
        <option value="topical">Topical</option>
      </select>
    </div>
    <div class="sort-group">
      <label for="sortOrder">Sort</label>
      <select id="sortOrder" onchange="applyFilters()">
        <option value="name">Name A–Z</option>
        <option value="price-asc">Price Low–High</option>
        <option value="price-desc">Price High–Low</option>
      </select>
    </div>
  </div>

  <div class="comparison-grid" id="comparisonGrid"></div>

  <footer>Prices are approximate and may vary. Always confirm current pricing with your dispensary.</footer>
</div>

<script>
  const dispensaries = [
    {
      name: "Green Leaf Medical",
      address: "412 Maple St",
      hours: "Mon–Sat 9am–8pm",
      license: "Medical & Rec",
      products: [
        { name: "Blue Dream (1/8 oz)", type: "flower",      price: 38.00, unit: "per 1/8 oz" },
        { name: "OG Kush (1/8 oz)",    type: "flower",      price: 42.00, unit: "per 1/8 oz" },
        { name: "Sour Diesel (1g)",    type: "flower",      price: 12.00, unit: "per gram"   },
        { name: "Brownie Bites 100mg", type: "edible",      price: 18.00, unit: "per pack"   },
        { name: "Gummy Bears 50mg",    type: "edible",      price: 14.00, unit: "per pack"   },
        { name: "Live Resin 1g",       type: "concentrate", price: 55.00, unit: "per gram"   },
        { name: "RSO Oil 1g",          type: "tincture",    price: 28.00, unit: "per gram"   },
        { name: "CBD Vape Cartridge",  type: "vape",        price: 44.00, unit: "per 0.5g"   },
        { name: "Relief Salve 500mg",  type: "topical",     price: 32.00, unit: "per jar"    },
      ]
    },
    {
      name: "Harvest Moon Dispensary",
      address: "87 Commerce Blvd",
      hours: "Daily 10am–9pm",
      license: "Medical",
      products: [
        { name: "Blue Dream (1/8 oz)", type: "flower",      price: 35.00, unit: "per 1/8 oz" },
        { name: "Gorilla Glue (1/8)",  type: "flower",      price: 40.00, unit: "per 1/8 oz" },
        { name: "Sour Diesel (1g)",    type: "flower",      price: 13.50, unit: "per gram"   },
        { name: "Gummy Bears 50mg",    type: "edible",      price: 12.50, unit: "per pack"   },
        { name: "Chocolate Bar 100mg", type: "edible",      price: 20.00, unit: "per bar"    },
        { name: "Wax Concentrate 1g",  type: "concentrate", price: 48.00, unit: "per gram"   },
        { name: "Live Resin 1g",       type: "concentrate", price: 52.00, unit: "per gram"   },
        { name: "CBD Tincture 500mg",  type: "tincture",    price: 45.00, unit: "per bottle" },
        { name: "RSO Oil 1g",          type: "tincture",    price: 25.00, unit: "per gram"   },
        { name: "CBD Vape Cartridge",  type: "vape",        price: 40.00, unit: "per 0.5g"   },
      ]
    },
    {
      name: "Elevated Wellness",
      address: "1203 River Rd, Suite 5",
      hours: "Mon–Fri 8am–7pm, Sat 9am–6pm",
      license: "Medical",
      products: [
        { name: "Blue Dream (1/8 oz)", type: "flower",      price: 40.00, unit: "per 1/8 oz" },
        { name: "OG Kush (1/8 oz)",    type: "flower",      price: 38.00, unit: "per 1/8 oz" },
        { name: "Indica Blend (1g)",   type: "flower",      price: 10.00, unit: "per gram"   },
        { name: "Brownie Bites 100mg", type: "edible",      price: 16.00, unit: "per pack"   },
        { name: "Hard Candy 25mg x4",  type: "edible",      price: 11.00, unit: "per pack"   },
        { name: "Rosin 1g",            type: "concentrate", price: 60.00, unit: "per gram"   },
        { name: "Wax Concentrate 1g",  type: "concentrate", price: 45.00, unit: "per gram"   },
        { name: "CBD Tincture 500mg",  type: "tincture",    price: 42.00, unit: "per bottle" },
        { name: "Muscle Rub 250mg",    type: "topical",     price: 28.00, unit: "per tube"   },
        { name: "Relief Salve 500mg",  type: "topical",     price: 30.00, unit: "per jar"    },
        { name: "CBD Vape Cartridge",  type: "vape",        price: 38.00, unit: "per 0.5g"   },
        { name: "Delta-8 Vape 1g",     type: "vape",        price: 35.00, unit: "per gram"   },
      ]
    }
  ];

  // Build a map of best price per product name
  function buildBestPriceMap(items) {
    const map = {};
    items.forEach(({ name, price }) => {
      if (!(name in map) || price < map[name]) map[name] = price;
    });
    return map;
  }

  function applyFilters() {
    const query   = document.getElementById('searchInput').value.toLowerCase().trim();
    const typeVal = document.getElementById('typeFilter').value;
    const sortVal = document.getElementById('sortOrder').value;

    // Flatten all products for best-price calculation (using active filter)
    let allFiltered = [];
    dispensaries.forEach(d => {
      d.products.forEach(p => {
        if (typeVal && p.type !== typeVal) return;
        if (query && !p.name.toLowerCase().includes(query)) return;
        allFiltered.push({ ...p, dispensary: d.name });
      });
    });

    const bestMap = buildBestPriceMap(allFiltered);

    // Count overall best-deal dispensary
    const dealCount = {};
    allFiltered.forEach(p => {
      if (p.price === bestMap[p.name]) {
        dealCount[p.dispensary] = (dealCount[p.dispensary] || 0) + 1;
      }
    });
    const topDealer = Object.entries(dealCount).sort((a,b) => b[1]-a[1])[0];

    // Update summary
    const activeDispensaries = new Set(allFiltered.map(p => p.dispensary)).size;
    document.getElementById('statDispensaries').textContent = activeDispensaries;
    document.getElementById('statProducts').textContent = allFiltered.length;
    const cats = new Set(allFiltered.map(p => p.type)).size;
    document.getElementById('statCategories').textContent = cats;
    document.getElementById('bestDealBanner').innerHTML = topDealer
      ? `Most savings at <strong>${topDealer[0]}</strong> (${topDealer[1]} best price${topDealer[1]>1?'s':''})`
      : '';

    // Render each dispensary card
    const grid = document.getElementById('comparisonGrid');
    grid.innerHTML = '';

    dispensaries.forEach(d => {
      let products = d.products.filter(p => {
        if (typeVal && p.type !== typeVal) return false;
        if (query && !p.name.toLowerCase().includes(query)) return false;
        return true;
      });

      if (products.length === 0) return;

      if (sortVal === 'price-asc')  products.sort((a,b) => a.price - b.price);
      if (sortVal === 'price-desc') products.sort((a,b) => b.price - a.price);
      if (sortVal === 'name')       products.sort((a,b) => a.name.localeCompare(b.name));

      const card = document.createElement('div');
      card.className = 'dispensary-card';

      const isMedOnly = d.license === 'Medical';
      card.innerHTML = `
        <div class="dispensary-header">
          <div>
            <div class="dispensary-name">${d.name}</div>
            <div class="dispensary-meta">${d.address} &bull; ${d.hours}</div>
          </div>
          <div class="dispensary-badge ${isMedOnly ? 'medical' : ''}">${d.license}</div>
        </div>
        <div class="product-list" id="list-${d.name.replace(/\s+/g,'_')}"></div>
      `;

      const list = card.querySelector('.product-list');
      products.forEach(p => {
        const isBest = p.price === bestMap[p.name];
        const row = document.createElement('div');
        row.className = 'product-row';
        row.innerHTML = `
          <div class="product-info">
            <div class="product-name">${p.name}</div>
            <span class="product-type-tag tag-${p.type}">${p.type}</span>
          </div>
          <div class="product-price-col">
            <div class="product-price ${isBest ? 'best' : ''}">$${p.price.toFixed(2)}</div>
            <div class="product-unit">${p.unit}</div>
          </div>
        `;
        list.appendChild(row);
      });

      if (list.children.length === 0) {
        list.innerHTML = '<div class="no-results">No products match your filters.</div>';
      }

      grid.appendChild(card);
    });

    if (grid.children.length === 0) {
      grid.innerHTML = '<div class="no-results" style="grid-column:1/-1;padding:3rem;">No results found. Try adjusting your filters.</div>';
    }
  }

  applyFilters();
</script>
</body>
</html>
